<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuenta del Omer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --success: #10b981;
      --success-hover: #059669;
      --bg: #f3f4f6;
      --surface: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      padding: 2rem;
      border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    .header-icon {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.75rem;
      margin: 0 0 0.5rem 0;
      font-weight: 700;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    /* Progress Bar */
    .progress-container {
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      width: 100%;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }

    .progress-bar {
      background: var(--primary);
      height: 100%;
      border-radius: 99px;
      transition: width 1s ease-in-out;
    }

    .countdown-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      display: block;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      margin-bottom: 0.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.875rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      box-sizing: border-box;
    }

    .button-group .btn {
      flex: 1; /* Para que compartan el espacio 50/50 */
      margin-bottom: 0;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: #f0fdf4;
      color: var(--success-hover);
      border: 1px solid #48ff88; /* Tu color modificado */
    }

    .btn-secondary:hover {
      background-color: #dcfce7;
    }

    /* Botón Check (Nuevo) */
    .btn-check {
      background: #f3f4f6;
      color: var(--text-muted);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    
    .btn-check.active {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    /* Verse */
    .verse-box {
      background: #f8fafc;
      border-left: 4px solid var(--primary);
      padding: 1rem;
      border-radius: 0 12px 12px 0;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: left;
    }

    /* Calendar Grid */
    .calendar-title {
      font-weight: 600;
      margin-bottom: 1rem;
      display: block;
      text-align: left;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 1rem;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
    }

    .day-past {
      background: #6f009b4f; /* Tu color modificado */
      color: var(--text-main);
    }

    .day-read {
      background: #dcfce7 !important;
      color: #15803d !important;
    }

    .day-selected {
      border-color: var(--primary) !important;
      transform: scale(1.1);
      z-index: 1;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .day-today {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
    }

    .day-future {
      background: transparent;
      border: 1px dashed var(--border);
      color: #9ca3af;
      pointer-events: none; /* Deshabilita clics en días futuros */
    }

    .day-50 {
      background: var(--success);
      color: white;
      padding: 0.75rem;
      border-radius: 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Canvas oculto */
    #share-canvas { display: none; }
  </style>
</head>
<body>

  <div class="card">
    <i class="fa-solid fa-dove header-icon"></i>
    <h1 id="omer-title">Cargando...</h1>
    <p class="subtitle" id="omer-subtitle"></p>

    <div class="progress-container">
      <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
    </div>
    <span class="countdown-text" id="countdown"></span>

    <button id="btn-mark-read" class="btn btn-check" onclick="toggleReadStatus()" style="display: none;">
      <i class="fa-regular fa-circle-check"></i> Marcar como leído
    </button>

    <div class="button-group">
      <a id="btn-study" class="btn btn-primary" href="#" target="_blank" style="display: none;">
        <i class="fa-solid fa-book-open"></i> Estudio
      </a>
      
      <button class="btn btn-secondary" onclick="shareToWhatsApp()">
        <i class="fa-brands fa-whatsapp"></i> Compartir
      </button>
    </div>

    <div class="verse-box" id="daily-verse"></div>

    <span class="calendar-title">Historial de Cuenta</span>
    <div class="calendar-grid" id="calendar-grid"></div>
    <div class="day-50" id="day-50-banner">DÍA 50: SHAVUOT</div>
  </div>

  <canvas id="share-canvas" width="1080" height="1080"></canvas>

  <script>
    // --- Configuración y Datos ---
    const startDateStr = "2026-04-04T19:00:00"; 
    const totalDays = 50;
    
    // Variables de Estado (NUEVO)
    let currentDayReal = 0; 
    let selectedDay = 0;    
    let readDays = JSON.parse(localStorage.getItem('omerReadDays')) || [];
    
    const verses = [
      "La semana del cruce del Mar Rojo (Éxodo 14.26 - 15.21)",
      "La semana del cambio del agua de la amargura (Éxodo 14.26 - 15.21)",
      "Elim, 12 arroyos de agua y 70 palmeras (Éxodo 15.27 - 16.03)",
      "La semana del maná cayendo del cielo (Éxodo 16.04 - 16.36)",
      "La semana de brotar agua de la roca (Éxodo 17.01 - 17.07)",
      "La semana de las batallas contra Amaleq (Éxodo 17.08 - 17.16)",
      "La semana de permanecer en el Monte Sinaí (Éxodo 19.01 - 19.25)"
    ];

    const pdfs = Array.from({ length: 50 }, (_, i) => {
      const dayNum = i + 1;
      const dayWord = dayNum === 28 ? "dia" : "d%C3%ADa"; 
      return {
        title: `Estudio Día ${dayNum}`,
        url: `https://retorno.tv/Pascua2020/Omer/${dayWord}%20${dayNum}%20-%20cuenta%20del%20Omer.pdf`
      };
    });

    // --- Lógica Principal ---
    function init() {
      const start = new Date(startDateStr);
      const now = new Date();
      
      const omerStart = now >= start ? start : new Date(start.getTime() - 24 * 60 * 60 * 1000);
      const diffTime = now - omerStart;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

      // Definimos el día real actual
      currentDayReal = Math.max(0, Math.min(diffDays, totalDays));
      
      // *MODO PRUEBA*: Si querés probar el calendario, descomentá la línea de abajo y poné un número (ej. 15)
      //currentDayReal = 21;

      selectedDay = currentDayReal; // Iniciamos viendo el día de hoy
      
      updateUI();
    }

    function updateUI() {
      // Tu lógica adaptada para el día que estamos VIENDO (selectedDay)
      let weeks = Math.floor(selectedDay / 7) + 1;
      let days = selectedDay % 7 || 7; 
      if (selectedDay === 49){
        weeks = 7;
        days = 7;
      }
      
      const titleEl = document.getElementById("omer-title");
      const subtitleEl = document.getElementById("omer-subtitle");
      const countdownEl = document.getElementById("countdown");
      const progressEl = document.getElementById("progress-bar");
      const studyBtn = document.getElementById("btn-study");
      const checkBtn = document.getElementById("btn-mark-read");
      const verseEl = document.getElementById("daily-verse");

      if (selectedDay > 0 && selectedDay < 50) {
        titleEl.textContent = `Día ${selectedDay} del Omer`;
        // Agregamos un indicador si estamos viendo un día pasado
        let extraText = selectedDay === currentDayReal ? "" : " (Historial)";
        subtitleEl.textContent = `Semana ${weeks}, Día ${days}${extraText}`;
        
        const remainingDays = totalDays - currentDayReal; // Countdown real
        countdownEl.textContent = `Faltan ${remainingDays} día${remainingDays !== 1 ? 's' : ''}`;
        progressEl.style.width = `${(currentDayReal / totalDays) * 100}%`;

        studyBtn.style.display = "flex";
        studyBtn.href = pdfs[selectedDay - 1].url;

        checkBtn.style.display = "flex";
        if (readDays.includes(selectedDay)) {
          checkBtn.classList.add("active");
          checkBtn.innerHTML = '<i class="fa-solid fa-check-double"></i> ¡Leído!';
        } else {
          checkBtn.classList.remove("active");
          checkBtn.innerHTML = '<i class="fa-regular fa-circle-check"></i> Marcar como leído';
        }

        // Tu lógica de texto con salto de línea
        let verseIndex = Math.min(weeks - 1, 6);
        const textoConSalto = verses[verseIndex].replace(" (", "<br>(");
        verseEl.innerHTML = `<strong>Lectura de la semana:</strong><br>"${textoConSalto}"`;
      } 
      else if (selectedDay === 50) {
        titleEl.textContent = "¡Día 50!";
        subtitleEl.textContent = "Fiesta de Shavuot";
        countdownEl.textContent = "Cuenta completada exitosamente.";
        progressEl.style.width = "100%";
        progressEl.style.backgroundColor = "var(--success)";
        
        studyBtn.style.display = "flex";
        studyBtn.href = pdfs[49].url;
        checkBtn.style.display = "none";
        verseEl.style.display = "none";
      } 
      else {
        titleEl.textContent = "Preparando la cuenta";
        subtitleEl.textContent = "El Omer aún no ha comenzado";
        countdownEl.textContent = "A la espera...";
        checkBtn.style.display = "none";
      }

      renderCalendar();
    }

    function renderCalendar() {
      const grid = document.getElementById("calendar-grid");
      const banner50 = document.getElementById("day-50-banner");
      let html = "";

      for (let i = 1; i <= 49; i++) {
        let stateClass = "";
        
        if (i > currentDayReal) {
          stateClass = "day-future";
        } else {
          stateClass = "day-past";
          if (readDays.includes(i)) stateClass += " day-read";
          if (i === currentDayReal) stateClass = "day-today"; // Sobreescribe si es hoy
          if (i === selectedDay) stateClass += " day-selected";
        }

        html += `<div class="day-cell ${stateClass}" onclick="selectDay(${i})">${i}</div>`;
      }
      
      grid.innerHTML = html;

      if (currentDayReal === 50 || selectedDay === 50) {
        grid.style.display = "none";
        banner50.style.fontSize = "1.5rem";
        banner50.style.padding = "3rem 1rem";
        banner50.innerHTML = "🎉 ¡FELIZ SHAVUOT! 🎉";
      }
    }

    // Funciones de interacción nuevas
    function selectDay(day) {
      if (day <= currentDayReal) {
        selectedDay = day;
        updateUI();
      }
    }

    function toggleReadStatus() {
      if (readDays.includes(selectedDay)) {
        readDays = readDays.filter(d => d !== selectedDay);
      } else {
        readDays.push(selectedDay);
      }
      localStorage.setItem('omerReadDays', JSON.stringify(readDays));
      updateUI();
    }

    // Generación de Imagen y Compartir
    function shareToWhatsApp() {
      const title = document.getElementById("omer-title").textContent;
      const subtitle = document.getElementById("omer-subtitle").textContent;
      const studyLink = document.getElementById("btn-study").href;
      
      let message = `🕊️ *${title}*\n📿 ${subtitle}\n\n`;
      if (studyLink && studyLink !== "#") {
         message += `📖 Estudio del día:\n${studyLink}`;
      }
      
      window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    }
    // Iniciar la app
    init();
  </script>
</body>
</html>
